name: Common Build

on:
  workflow_call:
    inputs:
      python-versions: { required: true, type: string }
      oses: { required: true, type: string }
      upload-artifacts: { required: false, default: false, type: boolean }

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.oses) }}
        python-version: ${{ fromJson(inputs.python-versions) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install system packages required
        shell: bash
        run: bash scripts/bootstrap-environment.sh

      - name: Resolve Python version
        shell: bash
        run: bash scripts/resolve-python.sh "${{ matrix.python-version }}" src

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.RESOLVED_PYTHON }}

      - name: Install Python deps with uv
        shell: bash
        run: |
          echo "Using Python: $(python -V)"
          uv sync --frozen --extra dev

      - name: Run checks
        shell: bash
        run: uv run python dev.py check

      - name: Build wheel/sdist/zipapp (Ubuntu and the latest Python only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == 'latest'
        shell: bash
        run: uv run python dev.py build

      - name: Build standalone binary (all OSes and the latest Python only)
        if: matrix.python-version == 'latest'
        shell: bash
        run: uv run python dev.py build-standalone

      - name: Test built artifacts
        if: matrix.python-version == 'latest'
        shell: bash
        run: scripts/test-dist.sh

      - name: Upload build artifacts
        if: inputs.upload-artifacts && matrix.python-version == 'latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          retention-days: 1
